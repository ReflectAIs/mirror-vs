
name: Feature Request
description: Propose a new feature for Mirror VS
title: "[Feature]: "
labels: ["enhancement", "frontend", "backend"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please check the [roadmap](https://github.com/DipeshMajithia/mirror-vs#-roadmap) and [existing requests](https://github.com/DipeshMajithia/mirror-vs/issues) first.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Describe the use case.
      placeholder: "I'm always frustrated when..."
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - agent
        - provider
        - frontend / ui
        - backend / api
        - tooling / ci
        - documentation
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe what you'd like to happen. Be as specific as possible.
      placeholder: "A new command/setting/tool that..."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, sketches, references to other tools that have similar features
